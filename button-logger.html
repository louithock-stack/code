<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Louithock Logging</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Courier New', Courier, monospace;
      background: #ffffff;
      color: #111;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 14px 24px;
      border-bottom: 1px solid #e0e0e0;
      background: #fff;
    }

    header h1 {
      font-size: 1rem;
      font-weight: bold;
      letter-spacing: 0.02em;
      color: #111;
    }

    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* LOG */
    .log-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #e0e0e0;
      overflow: hidden;
      background: #fff;
    }

    .log-label {
      padding: 8px 16px;
      font-size: 0.7rem;
      color: #888;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .log-label button {
      background: none;
      border: 1px solid #ddd;
      font-family: inherit;
      font-size: 0.65rem;
      color: #888;
      padding: 2px 8px;
      cursor: pointer;
      border-radius: 2px;
    }

    .log-label button:hover { border-color: #aaa; color: #444; }

    #log {
      flex: 1;
      overflow-y: auto;
      padding: 10px 0;
    }

    .log-entry {
      padding: 4px 16px;
      font-size: 0.78rem;
      line-height: 1.6;
      color: #222;
      animation: fadein 0.15s ease;
    }

    @keyframes fadein {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .log-entry .ts { color: #aaa; margin-right: 8px; font-size: 0.7rem; }
    .log-entry .user { color: #555; }
    .log-entry .action { color: #111; font-weight: bold; }

    .log-empty { padding: 20px 16px; color: #bbb; font-size: 0.75rem; }

    /* BUTTONS */
    .button-panel {
      width: 220px;
      min-width: 180px;
      display: flex;
      flex-direction: column;
      background: #fff;
      overflow: hidden;
    }

    .btn-label {
      padding: 8px 16px;
      font-size: 0.7rem;
      color: #888;
      border-bottom: 1px solid #e0e0e0;
    }

    .btn-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .action-btn {
      padding: 9px 14px;
      background: #fff;
      border: 1px solid #ddd;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.73rem;
      color: #111;
      cursor: pointer;
      text-align: left;
      border-radius: 3px;
      transition: background 0.1s, border-color 0.1s;
    }

    .action-btn:hover { background: #f5f5f5; border-color: #bbb; }
    .action-btn:active { background: #eee; transform: scale(0.98); }

    .status-bar {
      padding: 5px 16px;
      border-top: 1px solid #e0e0e0;
      font-size: 0.62rem;
      color: #aaa;
      background: #fff;
      display: flex;
      gap: 18px;
    }

    .status-bar b { color: #555; }
  </style>
</head>
<body>

<header>
  <h1>Louithock Logging</h1>
</header>

<div class="workspace">

  <div class="log-panel">
    <div class="log-label">
      <span>// event log</span>
      <button onclick="clearLog()">clear</button>
    </div>
    <div id="log">
      <div class="log-empty" id="empty-msg">// waiting for events...</div>
    </div>
  </div>

  <div class="button-panel">
    <div class="btn-label">// trigger side</div>
    <div class="btn-list" id="btn-list"></div>
  </div>

</div>

<div class="status-bar">
  <span>events: <b id="stat-total">0</b></span>
  <span>last: <b id="stat-last">—</b></span>
</div>

<script>
  const buttons = [
    "Trigger the Trigger",
    "Fire the Event",
    "Execute Command",
    "Run the Process",
    "Send the Signal",
    "Push the Request",
    "Start the Loop",
    "Invoke Handler",
    "Flush the Queue",
    "Call the Function",
  ];

  let total = 0;

  const list = document.getElementById('btn-list');

  buttons.forEach(label => {
    const btn = document.createElement('button');
    btn.className = 'action-btn';
    btn.textContent = label;
    btn.addEventListener('click', () => logEvent(label));
    list.appendChild(btn);
  });

  function logEvent(label) {
    total++;
    const empty = document.getElementById('empty-msg');
    if (empty) empty.remove();

    const log = document.getElementById('log');
    const now = new Date();
    const ts = now.toLocaleTimeString('en-GB', { hour12: false });

    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerHTML = `<span class="ts">[${ts}]</span><span class="user">(user)</span> triggered <span class="action">&lt;${label}&gt;</span>`;
    log.appendChild(entry);
    log.scrollTop = log.scrollHeight;

    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-last').textContent = label;
  }

  function clearLog() {
    const log = document.getElementById('log');
    log.innerHTML = '<div class="log-empty" id="empty-msg">// waiting for events...</div>';
    total = 0;
    document.getElementById('stat-total').textContent = 0;
    document.getElementById('stat-last').textContent = '—';
  }
</script>

</body>
</html>
